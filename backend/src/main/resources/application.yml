spring:
  application:
    name: scratchio-crm

  datasource:
    url: jdbc:postgresql://localhost:5432/scratchio_crm
    username: postgres
    password: Thibash@4842
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:ScratchIO-CRM-Super-Secret-Key-2024-Enterprise-SaaS-Application-256bit}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
